#   Jul 24, per-team starts == warning+5min per division.
# Cross-check: the owner-provided CSVs (alir25_{tracks,results,scratch_sheet}.csv,
#   downloaded Jul 2025 with an earlier scraper build) are row-for-row IDENTICAL to
#   the fresh 2026-07-23 download. Zero source conflicts. Fresh set is canonical raw/.

fleet_count:                     # every count below recounted from the raw CSVs, not carried over
  entries_scratch: 74            # 57 ACTIVE + 17 INACTIVE (withdrawn pre-race)
  results_rows: 57               # 49 AOK + 6 RET + 2 DNC
  results_by_course:
    around_long_island: 51       # 43 AOK + 6 RET + 2 DNC — IN SCOPE (Multihull 1, Non-Spin 14, Spin 36)
    around_the_islands: 6        # 6 AOK — OUT OF SCOPE (different 250 nm course, none tracked)
  tracked: 50                    # 49 racers + COMMITTEE BOAT
  in_scope_expectation: 49       # ALIR-course racers with tracks: 43 finishers + 6 RET
  untracked: ["Wind Song (Non-Spin Div 1, DNC)", "Rocksteady (Spin Div 0, DNC)",
              "all 6 Around-the-Islands boats (different 250 nm course, out of scope)"]
  pipeline_check: "A trial build on a scratch copy resolves exactly 43 scored boats + 6 fleet_dnf
    (the RET boats, all tracked) + 6 name-misses (the ATI boats), 49 fleet ghost tracks. Matches."

anomalies:
  - "TZ MISLABEL (adjudicated): results finish_time_utc is EDT wall clock with a spurious Z suffix.
     Probe: track finish-line crossings sit +4.00 h from claimed on 5 boats (Max +3.99, Daffodil +4.00,
     Habiru +3.99, Wahoo +4.00, Dolcezza +4.00; all 0.05–0.14 nm from the breakwater light).
     YS races[].startTime carries the same mislabel; YB epochs are TRUE UTC.
     Consequence: derive_results_columns.py strips the fake Z with NO offset shift."
  - "Name joins (sail-only, proposed): Habiru->Habiru YCC, Little Texas->Little Texas YCC,
     Unbreakable->Unbreakable YCC (YB drops the Youth Challenge Cup suffix)."
  - "Case-only differences (tracker mixed-case vs results ALL-CAPS): Pathfinder/PATHFINDER,
     Duet/DUET, Actaea/ACTAEA, Acadia/ACADIA, Wanderer/WANDERER, Scapegoat/SCAPEGOAT. Handled by
     name_overrides.display ONLY — the join normalizer casefolds, so a by_name entry would not help
     the match while still rewriting the tracker name that ships as the fleet ghost's hover label."
  - "'Smoke &Mirrors' missing space in BOTH sources -> display override 'Smoke & Mirrors'."
  - "COMMITTEE BOAT present in tracks only -> exclude_boats."
  - "Wind Song + Rocksteady: DNC, no track -> proposed exclude_boats (the bir2026 'DNC at a
     mooring' precedent). Alternative: keep as meta-only DNF rows — owner's call."
  - "Name-join composition, fully accounted for (74 rows): 45 matched by name, 1 by name+sail,
     3 sail-only (the YCC suffix cases), 1 UNMATCHED-YB (COMMITTEE BOAT), 24 UNMATCHED-YS.
     The 24 decompose as 16 INACTIVE withdrawn entries + 8 ACTIVE-but-untracked (the 6
     Around-the-Islands boats + the 2 DNCs). No name-resolution miss remains."
  - "DUPLICATE ENTRY NAME (resolved): the scratch sheet carries TWO boats named Dolcezza — the
     racing one (Neill Parker Jr, sail 53, Hunter Legend 37.5, Non-Spin Div 2, finished 31:54:29)
     and a withdrawn INACTIVE entry (Victor Lee, sail 0, Hunter 37). This is why 16 of 17 INACTIVE
     entries are unmatched: the join correctly bound the tracker's Dolcezza to the ACTIVE boat by
     name+sail. Doctrine 4 case; no action needed, but any re-join must preserve the sail tiebreak."
  - "CORRECTION (a claim this record previously carried and that verification refuted): there is NO
     Wanderer/Windancer duplicate-sail collision. WANDERER is sail 181, Windancer is USA25."
  - "place_overall IS PER-CIRCLE, not fleet-wide. Three boats therefore carry overall rank 1
     (Max in Spinnaker, Dolcezza in Non-Spinnaker, Daffodil in Multihull). The shell's ranked
     list sorts on that field, so it would display '#1' three times. Stage-2 presentation decision:
     either rank the unified ladder or scope the ranked list per circle. Flagged, not fixed here."
  - "divisions_in_scope has NO code consumer (documentation only). The 6 Around-the-Islands boats
     are kept out solely by being untracked. They are scored over 250 nm, so if one ever acquired a
     track or were added to untracked_meta_only, the pipeline would silently score it at 207 nm and
     be wrong by rating x 43 s. GUARD: untracked_meta_only stays empty for this race."
  - "Coverage: 50 tracked vs 57 active entries (fetch warning) — the gap is exactly the ATI
     course + 2 DNCs; spatial analysis is scoped to the ALIR course where coverage is COMPLETE."
  - "Sound-entry gate: 43/45 in-scope finishers used Plum Gut. 'The Race' crossings: Kitli, Vamonos
     (both RET — likely post-retirement deliveries). Yopo (finisher) closest-approach 3.7 nm off the
     Plum Gut centerpoint — possibly a Gull-passage transit; verify at stage 2 before any per-boat
     gate claim. Course polyline routes via Plum Gut."
  - "NOISE FLOOR IS LOAD-BEARING FOR THIS RACE'S HEADLINE. Measured corrected margins at the top
     of the Spinnaker circle: Max 27:02:56, Phantom +4:05, Wahoo +4:50 — THREE boats inside five
     minutes after 27 hours (0.25% of elapsed). Max's own-division margin over Wahoo is 4 min;
     Habiru YCC won Division X by 6 min; Dolcezza won the Non-Spinnaker circle by 3:54.
     Against the proposed floor (rating uncertainty ~3 s/mi x 207 nm ~ 10 min) every one of those
     placings is sub-floor. Doctrine 6 therefore binds the copy: Max's overall win is OFFICIAL and
     stated as such, but the top three must be narrated as a rating-scale dead heat, never as a
     margin Max sailed for. Stage-1 controversy check (protests/redress/rescoring) runs before any
     tight-margin sentence is written."
  - "Claims-in-circulation: WindCheck headline reads 'Sound's Great wins 2025 ALIR' while the
     results show that boat 22nd overall in the Spinnaker circle and 1st in Division 5 — likely a
     club/divisional trophy framing. Site is bot-walled (403 to plain fetch); resolve at stage 1
     before it contaminates the narrative."

