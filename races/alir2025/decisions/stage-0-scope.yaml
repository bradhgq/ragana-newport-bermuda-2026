start_method:
  method: finish_minus_elapsed
  verification: "Reproduces warning-signal + 5 min EXACTLY for all 11 divisions (9 in scope), with
    a single consistent start per division — no intra-division spread. Cross-checked against YB
    RaceSetup.teams[].start, which carries 9 distinct epochs in TRUE UTC (1753369500 = 15:05Z =
    11:05 EDT through 1753374300 = 16:25Z = 12:25 EDT), matching the same warning+5 pattern.
    YS races[].startTime agrees on the clock values but repeats the EDT-labeled-as-Z defect."
  note: "Staggered per-division starts do NOT break the default method here; no pursuit start."

course_model: "marks (routed DTF via pipeline/route.py): start [40.7028,-74.0367] (SI line NE of
  Ellis Island) -> Verrazzano Narrows -> Ambrose Channel Red Bell Q R \"14\" [40.5281,-74.0094]
  (the ONE mandatory mark, left to port; all other government marks may be disregarded per SI)
  -> 3 south-shore spine waypoints drafted from the sailed median (the direct Ambrose->Montauk
  great circle crosses Long Island) -> Montauk Pt rounding [41.0600,-71.8450] -> Plum Gut
  [41.1680,-72.2150] -> mid-Sound [41.0500,-73.3500] (clears Eatons Neck) -> finish
  [40.8619,-73.6603] (Glen Cove Breakwater light). Draft polyline 203.6 nm vs official scoring
  distance 207.0 (SI: 'considered 207 nm for scoring purposes'; delta -3.4 logged by build).
  SI mandates neither Plum Gut nor The Race — the fleet chose Plum Gut (see anomalies)."

divisions_in_scope: ["Around Long Island Course: Non-Spin 1, Non-Spin 2, Spin 4, Spin 5, DH 7,
  Spin 9, Spin X, Spin 0, Multihull M (9 divisions, 3 scored circles). OUT: the two
  Around-the-Islands circles (250 nm course, untracked)."]

cross_circle_comparison: "PROPOSED: ship a unified UNOFFICIAL corrected ladder across all three
  ALIR circles. Basis: every rating (incl. Daffodil's NEMA -20) is sec/mi on the identical 207.0 nm
  ToD formula — verified EXACT (0 mismatches) for all 49 scored boats. Official scoring stays
  per-circle; the unified view is labeled unofficial.
  WHY IT MATTERS MORE THAN USUAL HERE: Daffodil was the only multihull ENTERED, so her official
  result is 1-of-1 and carries no comparison whatsoever. On the unified 43-boat ladder she places
  30th, +5:57:46 behind the leader. Without this view she has no measurable peers; with it she has
  42. Exploratory numbers — stage 2 re-derives everything through the pipeline."

narrative_framing:               # owner directive, 2026-07-23 — binding on stages 2-4
  dual_focus_not_duel: "Daffodil and Max are TWO SEPARATE FOCUSES, never a head-to-head.
    Every chart and caption reads 'here is what Daffodil did in this period; here is what Max
    did' — parallel accounts of the same phase, not a 1v1 matchup. No 'X beat Y' framing between
    them, no gap-to-Max series for Daffodil (or the reverse) as a headline metric, no shared
    duel module. They sailed different boats in different divisions with different problems;
    the interest is what each did with the same water and weather.
    Consequence for the module list at stage 2: the duel/delta module (if any) applies to
    same-division comparisons (e.g. Max vs Wahoo, Daffodil vs the fleet's corrected pace),
    never to the two heroes against each other. Loss-decomposition claims still name their
    benchmark (doctrine 5) — that benchmark is a division rival, not the other hero."

ping_cadence:                    # measured over the RACING window only (start -> official finish);
                                 # post-finish pings are excluded, since trackers stay on for the
                                 # delivery home (Dolcezza's 9.1 h "gap" is entirely post-finish)
  nominal: "300 s (5 min) — the median interval for all 49 tracked racers, no exceptions"
  distribution: "23,271 intervals: 2.16% <=60 s (start/finish 1-min bursts), 95.72% 61-300 s,
    1.95% 301-600 s, 0.02% 601-1800 s, 0.15% >1800 s"
  gaps: "Only 2 boats show any in-race gap over 30 min, and only one exceeds 1 h (Vamonos, RET,
    and that gap falls on 07-27 after retirement). No finisher has an in-race gap over 1 h."
  focus_boats: "Daffodil max gap 10 min · Max 5 min · Habiru YCC 10 min — the boats carrying the
    narrative have effectively unbroken coverage."
  grid_justification: "grid.minutes 15 with interpolate_limit 4 (= 1 h of bridging) sits well
    above the 5-min nominal cadence and comfortably covers every in-race gap. The default is
    correct here; no deviation needed."

tier: 1                          # public data only; dual-focus presentation within Tier 1
grid_minutes: 15                 # justified by ping_cadence above
scoring:
  system: tod
  params: { rating_column: rating }   # NOTE: the ToD distance comes from course.official_length_nm
                                      # (build_data reads it there and passes it to scoring). Do NOT
                                      # add distance_nm to scoring.params — the key has no reader
                                      # and would silently do nothing.
  probe_boats: ["Max", "Daffodil"]    # trial build: both reproduce official corrected with 0.0 s
                                      # error; all 43 in-scope finishers exact at 207.0 nm

weather_evidence:                # EXPERIMENTAL stage-0 extra (owner-requested)
  landed: "races/alir2025/raw/weather/ (NDBC 44065+44025+MTKN6+KPTN6 yearly 2025 stdmet;
    ERA5 hourly wind at 5 course points; CO-OPS current predictions for Plum Gut, The Race,
    Matinecock Pt, Execution Rocks). Provenance + sha256 in raw/weather/MANIFEST.md."
  verified: "Every file decompressed/parsed and its race-window coverage counted; all 17 sha256s
    re-checked against disk. Working wind: 44065 (NY Harbor, 430 rows 1.2-11.0 m/s), 44025
    (south-shore reach, 432 rows 3.7-10.8), KPTN6 (western Sound, 712 rows 0.0-10.1). Waves:
    44065 (0.6-1.4 m), 44025 (0.6-1.5 m), 44097 Block Island (0.4-1.5 m). ERA5: 5 points x 72 h
    in knots, grid drift <=0.063 deg. Currents: Plum Gut race-night ebb -2.91 kt (07-25 13:58)
    and -2.89 kt (07-26 02:24), floods ~+2.0 kt."
  gap: "TWO observation gaps, both binding on what may be claimed.
    (1) MONTAUK CORNER HAS NO OBSERVED WIND: buoy 44017 has no 2025 file and shore station MTKN6's
    2025 file contains ZERO wind rows all year (fetched, verified empty, deleted rather than kept
    as false coverage). 44097 Block Island gives sea state only. Montauk wind is ERA5-model-only.
    (2) CENTRAL LI SOUND HAS NO 2025 PLATFORM AT ALL (44039/44040/44022/44069 all dead) — exactly
    where the fleet parked. ERA5's ~25 km grid smooths the micro-calms that decided the finish
    order. Park-zone and Montauk wind claims must be labeled model-supported, never observed.
    (44020 Nantucket Sound has wind but sits ~90 nm east — fetched, then discarded as too far to
    inform this course honestly.)"
  scope_guard: "evidence for stages 1-3 only; no pipeline number may depend on it; I18 (VMC never
    VMG) stands."
  followup: "if the layer proves useful, bake weather acquisition into starter/acquisition/ + the
    skill (docs/OPEN_THREADS.md entry)."

